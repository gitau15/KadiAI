version: "3.9"

services:
  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - QDRANT_URL=http://qdrant:6333
      - ZHIPU_API_KEY=${ZHIPU_API_KEY}
      - LLM_MODEL=${LLM_MODEL:-glm-4-flash}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-embedding-2}
      - QDRANT_COLLECTION=${QDRANT_COLLECTION:-election_law_chunks}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    depends_on:
      qdrant:
        condition: service_healthy
    volumes:
      - ./backend/data:/app/data

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  qdrant_data:
