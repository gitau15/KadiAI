services:
  - type: web
    name: kadiai-backend
    runtime: python
    region: oregon
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: ZHIPU_API_KEY
        sync: false
      - key: LLM_MODEL
        value: glm-4.5-flash
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: USE_LOCAL_EMBEDDING
        value: "true"
      - key: LOCAL_EMBEDDING_MODEL
        value: all-MiniLM-L6-v2
      - key: EMBEDDING_DIM
        value: "384"
